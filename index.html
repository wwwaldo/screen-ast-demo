<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>screen-ast · computer-use benchmarks</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --ink:#e6edf3; --muted:#8b949e; --line:#2a313c;
    --accent:#3b82f6; --ok:#3fb950; --warn:#d29922;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; }
  body { font-family:var(--sans); background:var(--bg); color:var(--ink); display:flex; height:100vh; overflow:hidden; }

  /* sidebar */
  .sidebar { width:290px; flex:none; background:var(--panel); border-right:1px solid var(--line);
             display:flex; flex-direction:column; overflow-y:auto; }
  .brand { padding:18px 18px 12px; border-bottom:1px solid var(--line); }
  .brand h1 { font-size:15px; margin:0; letter-spacing:.2px; }
  .brand p { font-size:12px; color:var(--muted); margin:4px 0 0; }
  .tests { padding:10px; display:flex; flex-direction:column; gap:8px; }
  .test { text-align:left; background:transparent; border:1px solid var(--line); border-radius:10px;
          padding:12px 13px; cursor:pointer; color:var(--ink); font-family:inherit; transition:border-color .12s, background .12s; }
  .test:hover { border-color:#3a434f; }
  .test.active { border-color:var(--accent); background:color-mix(in srgb, var(--accent) 12%, transparent); }
  .test .row { display:flex; align-items:center; gap:8px; }
  .test .name { font-size:14px; font-weight:600; }
  .test .tag { font-family:var(--mono); font-size:10.5px; padding:1px 7px; border-radius:20px; border:1px solid var(--line); color:var(--muted); }
  .test .tag.hard { color:var(--warn); border-color:color-mix(in srgb, var(--warn) 45%, var(--line)); }
  .test .desc { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.45; }
  .sidenote { margin-top:auto; padding:14px 16px; border-top:1px solid var(--line); font-size:11.5px; color:var(--muted); line-height:1.5; }
  .sidenote code { font-family:var(--mono); background:#0b0e13; padding:1px 5px; border-radius:5px; }
  .sidenote a { color:var(--accent); text-decoration:none; }

  /* main */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar { display:flex; align-items:center; gap:12px; padding:11px 16px; border-bottom:1px solid var(--line); background:var(--panel); }
  .topbar .title { font-size:14px; font-weight:600; }
  .topbar .spacer { flex:1; }
  .btn { font-family:var(--sans); font-size:12.5px; padding:6px 12px; border-radius:8px; border:1px solid var(--line);
         background:var(--bg); color:var(--ink); cursor:pointer; text-decoration:none; }
  .btn:hover { border-color:#3a434f; }
  .btn.primary { border-color:var(--accent); color:var(--accent); }
  .result { font-family:var(--mono); font-size:12px; color:var(--muted); max-width:420px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .result.ok { color:var(--ok); }
  iframe { flex:1; width:100%; border:none; background:#fff; }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <h1>screen-ast · benchmarks</h1>
      <p>Tiny computer-use tests. Point an agent at one and score it.</p>
    </div>
    <div class="tests" id="tests"></div>
    <div class="sidenote">
      Each test self-scores on <code>window.FIXTURE</code> (<code>.solved</code>, <code>.check()</code>,
      <code>.telemetry</code>). Anchors: oracle&nbsp;~ms · human&nbsp;~15s · pixel-agent&nbsp;~2min.<br><br>
      <a href="https://github.com/wwwaldo/screen-ast-demo" target="_blank" rel="noopener">source ↗</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="title" id="title">—</span>
      <span class="spacer"></span>
      <span class="result" id="result"></span>
      <button class="btn" id="check">Check result</button>
      <a class="btn primary" id="fullpage" target="_blank" rel="noopener">Open full page ↗</a>
    </div>
    <iframe id="frame" title="test"></iframe>
  </main>

<script>
  var TESTS = [
    { id: "country-dropdown", file: "country-dropdown.html", name: "Country Dropdown", tag: "scroll-hunt", hard: false,
      desc: "Select “United States” in a dropdown — 3 tiers (native / custom / virtualized). Target ~95% down an alphabetical list of 195." },
    { id: "workday-form", file: "workday-form.html", name: "Workday Form", tag: "div-soup", hard: true,
      desc: "Fill a Workday-style application — 15-deep div-soup, all-custom widgets, dependent country→state, and a state-gated submit." },
  ];

  var frame = document.getElementById("frame");
  var titleEl = document.getElementById("title");
  var fullpage = document.getElementById("fullpage");
  var resultEl = document.getElementById("result");
  var testsEl = document.getElementById("tests");
  var current = null;

  function select(t, push) {
    current = t;
    frame.src = t.file;
    titleEl.textContent = t.name;
    fullpage.href = t.file;
    resultEl.textContent = ""; resultEl.className = "result";
    Array.prototype.forEach.call(testsEl.children, function (c) { c.classList.toggle("active", c.dataset.id === t.id); });
    if (push) history.replaceState(null, "", "#" + t.id);
  }

  TESTS.forEach(function (t) {
    var b = document.createElement("button");
    b.className = "test"; b.dataset.id = t.id;
    b.innerHTML = '<div class="row"><span class="name"></span><span class="tag ' + (t.hard ? "hard" : "") + '"></span></div><div class="desc"></div>';
    b.querySelector(".name").textContent = t.name;
    b.querySelector(".tag").textContent = t.tag;
    b.querySelector(".desc").textContent = t.desc;
    b.addEventListener("click", function () { select(t, true); });
    testsEl.appendChild(b);
  });

  document.getElementById("check").addEventListener("click", function () {
    try {
      var F = frame.contentWindow.FIXTURE;
      if (!F) { resultEl.textContent = "no FIXTURE on this page"; return; }
      if (F.solved) {
        resultEl.className = "result ok";
        resultEl.textContent = "✓ solved · " + JSON.stringify(F.solved).slice(0, 120);
      } else {
        resultEl.className = "result";
        var extra = typeof F.check === "function" ? " · check=" + JSON.stringify(F.check()) : "";
        resultEl.textContent = "not solved yet" + extra;
      }
    } catch (e) { resultEl.textContent = "err: " + e.message; }
  });

  var start = TESTS.find(function (t) { return t.id === location.hash.slice(1); }) || TESTS[0];
  select(start, false);
</script>
</body>
</html>
